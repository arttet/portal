name: Daily Cache Cleanup

on:
  schedule:
    - cron: "50 1 * * *" # Daily at 01:50 UTC
  workflow_dispatch:

# Prevent concurrent runs of this cleanup workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # Default read-only for all jobs

jobs:
  clear:
    name: Clear Caches
    runs-on: ubuntu-latest

    permissions:
      actions: write # Minimum required to list and delete caches via gh CLI

    steps:
      - name: Clear all caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh cache delete --all --repo "$REPO"
