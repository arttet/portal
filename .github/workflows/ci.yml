name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 1 * * *" # Daily at 01:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Format Quality Gate
  # ---------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Format check (oxfmt)
        run: bunx oxfmt --check .

      - name: Format check (dprint)
        run: bunx dprint check

  # ---------------------------------------------------------------------------
  # Stage 1: Lint Quality Gate
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read # Required to checkout the repository

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Restore Bun cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check (svelte-check)
        run: bunx svelte-kit sync && bunx svelte-check --tsconfig ./tsconfig.json

      - name: Lint (oxlint)
        run: bunx --bun oxlint --deny-warnings .

      - name: Lint CSS (stylelint)
        run: bun run lint:css

      - name: Lint Svelte (eslint)
        run: bun run lint:svelte

      - name: Unused code (knip)
        run: bunx knip

      - name: Lint Markdown
        run: bun run lint:md

      - name: Spell check
        uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4.0
        with:
          check_dot_files: true
          files: |
            **/*.{md,mdx,txt,yml,yaml,json,jsonc,toml}

  # ---------------------------------------------------------------------------
  # Stage 1: Security Quality Gate
  # ---------------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      actions: read # Required by scorecard-action to inspect workflow files
      contents: read # Required to checkout the repository
      id-token: write # Required by scorecard-action to publish results to OpenSSF
      pull-requests: read # Required by dependency-review-action
      security-events: write # Required to upload SARIF results to GitHub Security tab

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Review dependency changes
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          extra_args: --results=verified,unknown

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,misconfig
          exit-code: "1"
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-results.sarif

      - name: SAST (Semgrep)
        run: pipx run semgrep==1.168.0 ci --oss-only

      - name: Zizmor
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: pedantic

      - name: Zizmor (fork-safe)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true }}
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          persona: pedantic

      - name: Scorecard
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Upload Scorecard results to Security tab
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif

  # ---------------------------------------------------------------------------
  # Stage 1: Antivirus Scan Gate
  # ---------------------------------------------------------------------------
  antivirus:
    name: Antivirus
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install --yes clamav

      - name: Prepare freshclam
        run: |
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo pkill -f freshclam 2>/dev/null || true
          sudo rm -f /var/log/clamav/freshclam.log

      - name: Update virus database
        run: |
          for attempt in 1 2 3; do
            sudo freshclam && exit 0
            echo "::warning::freshclam attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          echo "::warning::ClamAV database update failed after 3 attempts; scanning with installed definitions"

      - name: Scan for malware
        run: |
          clamscan -r \
            --infected \
            --exclude-dir='^\.git$' \
            --detect-pua \
            --heuristic-scan-precedence \
            .

  # ---------------------------------------------------------------------------
  # Stage 1: CodeQL Analysis Gate
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read # Required to checkout the repository
      security-events: write # Required to upload CodeQL SARIF results to GitHub Security tab

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:javascript-typescript

  # ---------------------------------------------------------------------------
  # Stage 2: Build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: [fmt, lint, security, codeql, antivirus]

    permissions:
      contents: read # Required to checkout the repository

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Restore Bun cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

      - name: Build site
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: portal-build
          path: target/build
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Stage 2: Attest Build (non-PR only — needs OIDC)
  # ---------------------------------------------------------------------------
  attest:
    name: Attest Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    if: github.event_name != 'pull_request'

    permissions:
      attestations: write # Required to create artifact attestations
      contents: read # Required to download the build artifact
      id-token: write # Required by Sigstore to sign attestations via OIDC

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: portal-build
          path: target/build

      - name: Package build output
        run: tar -czf target/portal-build.tar.gz -C target/build .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: target/portal-build.tar.gz

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: target/build
          format: spdx-json
          output-file: target/sbom.spdx.json

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: target/portal-build.tar.gz
          sbom-path: target/sbom.spdx.json

  # ---------------------------------------------------------------------------
  # Stage 2: Chromium Unit Tests
  # ---------------------------------------------------------------------------
  unit-chromium:
    name: Chromium Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: [fmt, lint, security, codeql, antivirus]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Restore Bun cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      - name: Run unit tests with coverage
        env:
          VITEST_BROWSER: chromium
        run: bun run test:unit:coverage

      - name: Upload unit test results artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-results
          path: target/test-results/vitest.junit.xml
          if-no-files-found: error

      - name: Upload unit coverage artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-coverage
          path: target/coverage/lcov.info
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Stage 2: Firefox Unit Tests
  # ---------------------------------------------------------------------------
  unit-firefox:
    name: Firefox Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: [fmt, lint, security, codeql, antivirus]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Restore Bun cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright (firefox)
        run: bunx playwright install --with-deps firefox

      - name: Run browser unit tests in Firefox
        env:
          VITEST_BROWSER: firefox
        run: bunx vitest run --project=client --passWithNoTests

  # ---------------------------------------------------------------------------
  # Stage 2: Integration Tests
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: [fmt, lint, security, codeql, antivirus]

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Restore Bun cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      - name: Run integration tests
        run: bun run test:playwright

      - name: Upload integration test results artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-results
          path: target/test-results/playwright.junit.xml
          if-no-files-found: error

      - name: Upload Playwright report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: target/playwright-report
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Stage 3: Codecov
  # ---------------------------------------------------------------------------
  codecov:
    name: Codecov
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: [unit-chromium, integration]
    if: ${{ needs.unit-chromium.result == 'success' || needs.integration.result == 'success' }}

    env:
      HAS_CODECOV: ${{ secrets.CODECOV_TOKEN != '' }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download unit test results artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unit-test-results
          path: target/test-results

      - name: Download unit coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unit-coverage
          path: target/coverage

      - name: Download integration test results artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: integration-test-results
          path: target/test-results

      - name: Upload unit test results to Codecov
        if: ${{ env.HAS_CODECOV == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: true
          files: target/test-results/vitest.junit.xml
          flags: unittests
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload integration test results to Codecov
        if: ${{ env.HAS_CODECOV == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: true
          files: target/test-results/playwright.junit.xml
          flags: integration
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload unit coverage to Codecov
        if: ${{ env.HAS_CODECOV == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: true
          files: target/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Stage 3: Cloudflare Preflight
  # ---------------------------------------------------------------------------
  cf-preflight:
    name: Cloudflare Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5

    needs: [fmt, lint, security, antivirus, build, unit-chromium, unit-firefox, integration]

    if: |
      github.event_name != 'schedule' &&
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true)

    outputs:
      enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block

      - name: Check Cloudflare configuration
        id: check
        env:
          ENABLED: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && vars.CF_PAGES_PROJECT != '' }}
        run: echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Stage 3: Deploy Cloudflare Pages
  # ---------------------------------------------------------------------------
  deploy-cf-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: needs.cf-preflight.outputs.enabled == 'true'
    needs: cf-preflight

    permissions:
      pull-requests: write # Required to post the Cloudflare Pages preview URL comment on PRs

    env:
      CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: portal-build
          path: target/build

      - name: Deploy preview (pull request)
        if: ${{ github.event_name == 'pull_request' }}
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy target/build --project-name=${{ env.CF_PAGES_PROJECT }} --branch=pr-${{ github.event.pull_request.number }} --commit-dirty=true

      - name: Deploy production (main)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy target/build --project-name=${{ env.CF_PAGES_PROJECT }} --commit-dirty=true

      - name: Update sticky PR comment
        if: ${{ github.event_name == 'pull_request' && steps.deploy.outputs.pages-deployment-alias-url != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: cloudflare-preview
          message: |
            ## Cloudflare Pages Preview

            Deployed: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
